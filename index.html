<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boredom Picker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        button {
            margin: 10px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
        #result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Boredom Picker</h1>
    <button id="funny">Something Funny</button>
    <button id="active">Something Active</button>
    <button id="relaxing">Something Relaxing</button>
    <button id="random">Whatever</button>

    <div id="result"></div>

    <script>
        const activities = {
            funny: [
                "Tiktok",
                "Watch a comedy show",
                "Play with the cat",
            ],
            active: [
                "Do pushups till failure",
                "Do 20 jumping jacks",
                "Run outside",
                "Dance to music",
            ],
            relaxing: [
                "Read a few pages of a book",
                "Meditate for 5 minutes",
                "Take deep breaths",
                "Get the cat",
            ]
        };

        document.getElementById('funny').addEventListener('click', () => pickActivity('funny'));
        document.getElementById('active').addEventListener('click', () => pickActivity('active'));
        document.getElementById('relaxing').addEventListener('click', () => pickActivity('relaxing'));
        document.getElementById('random').addEventListener('click', () => pickActivity(['funny', 'active', 'relaxing'][Math.floor(Math.random() * 3)]));

        function pickActivity(category) {
            const pool = activities[category];
            const randomIndex = Math.floor(Math.random() * pool.length);
            const activity = pool[randomIndex];
            document.getElementById('result').textContent = `${activity}`;
        }
    </script>
</body>
</html>
